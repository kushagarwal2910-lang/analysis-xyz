{% extends "base.html" %}

{% block title %}Contact - Analysis XYZ{% endblock %}

{% block content %}
<div class="legal-container">
    <div class="contact-card fade-in">
        <h1>Connect with Us</h1>
        <p class="subtitle">Have questions? Our specialists are here to help.</p>
        
        <form action="mailto:analysisxyz20@gmail.com" method="post" enctype="text/plain" class="contact-form">
            <div class="form-group">
                <input type="text" name="name" placeholder="Name" required>
            </div>
            <div class="form-group">
                <input type="text" name="subject" placeholder="Subject" required>
            </div>
            <div class="form-group">
                <textarea name="message" placeholder="How can we help?" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-full">Send Message</button>
        </form>
    </div>
</div>
{% endblock %}
